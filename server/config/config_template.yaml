# please see all available config in https://github.com/superdurable/iwf/blob/main/config/config.go
# You can use volume mount to override this config path(/iwf/config/config_template.yaml), e.g. for production
api:
  port: 8801
  queryWorkflowFailedRetryPolicy:
    initialIntervalSeconds: 1
    maximumAttempts: 5
interpreter:
  defaultWorkflowConfig:
    continueAsNewThreshold: 100
  temporal:
    hostPort: "temporal:7233"
    namespace: "default"
    cloudAPIKey: ""