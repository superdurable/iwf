name: Go SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk-go/**"
      - "protos/**"
      - ".github/workflows/sdk-go-ci.yml"
  pull_request:
    paths:
      - "sdk-go/**"
      - "protos/**"
      - ".github/workflows/sdk-go-ci.yml"
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk-go/go.mod
          cache-dependency-path: |
            sdk-go/go.sum
            go.work.sum
      - name: Unit tests
        run: go test -v ./iwf/... ./iwftest/...

  integ:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk-go/go.mod
          cache-dependency-path: |
            sdk-go/go.sum
            go.work.sum
      - name: Start iWF environment
        env:
          IWF_SERVER_IMAGE: superdurable/iwf-server:latest
        run: |
          docker pull "$IWF_SERVER_IMAGE"
          docker compose -f integ/docker-compose.yml up -d
      - name: Wait for iWF server
        run: |
          set -euo pipefail
          echo "Waiting for Elasticsearch..."
          for i in $(seq 1 60); do
            if docker exec temporal-elasticsearch-iwf curl -fsS http://localhost:9200/_cluster/health >/dev/null 2>&1; then
              echo "Elasticsearch ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for Elasticsearch"
              docker logs temporal-elasticsearch-iwf 2>&1 | tail -80 || true
              exit 1
            fi
            sleep 5
          done
          echo "Waiting for search attributes..."
          for i in $(seq 1 120); do
            if docker logs temporal-admin-tools-iwf 2>&1 | grep -q "All search attributes are registered"; then
              echo "Search attributes ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "Timed out waiting for search attributes"
              docker logs temporal-admin-tools-iwf 2>&1 | tail -80 || true
              docker logs temporal-iwf 2>&1 | tail -80 || true
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for iWF healthcheck..."
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8801/info/healthcheck >/dev/null 2>&1; then
              echo "iWF server healthy (attempt $i)"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for iWF server"
          docker compose -f integ/docker-compose.yml ps
          docker logs iwf-server 2>&1 | tail -80 || true
          exit 1
      - name: Integration tests
        run: make ci-tests
      - name: Dump docker logs
        if: always()
        uses: jwalton/gh-docker-logs@v2
