name: Go SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk-go/**"
      - "protos/**"
      - ".github/workflows/sdk-go-ci.yml"
  pull_request:
    paths:
      - "sdk-go/**"
      - "protos/**"
      - ".github/workflows/sdk-go-ci.yml"
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk-go/go.mod
          cache-dependency-path: |
            sdk-go/go.sum
            go.work.sum
      - name: Unit tests
        run: go test -v ./iwf/... ./iwftest/...

  integ:
    name: Integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: sdk-go/go.mod
          cache-dependency-path: |
            sdk-go/go.sum
            go.work.sum
      - name: Start iWF environment
        run: docker compose -f integ/docker-compose.yml up -d
      - name: Wait for iWF server
        run: |
          echo "Waiting for search attributes + iWF server..."
          for i in $(seq 1 90); do
            if docker logs temporal-admin-tools-iwf 2>&1 | grep -q "All search attributes are registered"; then
              echo "Search attributes ready"
              break
            fi
            sleep 2
          done
          for i in $(seq 1 60); do
            if (echo >/dev/tcp/127.0.0.1/8801) >/dev/null 2>&1; then
              sleep 10
              echo "iWF server port open (attempt $i)"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for iWF server"
          docker compose -f integ/docker-compose.yml ps
          docker logs iwf-server 2>&1 | tail -50 || true
          docker logs temporal-admin-tools-iwf 2>&1 | tail -50 || true
          exit 1
      - name: Integration tests
        run: make ci-tests
      - name: Dump docker logs
        if: always()
        uses: jwalton/gh-docker-logs@v2
