name: Python SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk-python/**"
      - "protos/**"
      - ".github/workflows/sdk-python-ci.yml"
  pull_request:
    paths:
      - "sdk-python/**"
      - "protos/**"
      - ".github/workflows/sdk-python-ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Run linters (sdk-python files only)
        working-directory: ${{ github.workspace }}
        run: |
          # Run from repo root so monorepo hook paths resolve; limit to sdk-python files.
          FILES=$(git ls-files -z -- sdk-python | tr '\0' ' ')
          (cd sdk-python && poetry run pre-commit run --show-diff-on-failure --color=always --files $FILES)

  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - name: Start iWF environment
        working-directory: sdk-python/iwf/tests/iwf-service-env
        env:
          IWF_SERVER_IMAGE: superdurable/iwf-server:latest
        run: |
          docker pull "$IWF_SERVER_IMAGE"
          docker compose up -d
      - name: Wait for iWF server
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          echo "Waiting for Elasticsearch..."
          for i in $(seq 1 60); do
            if docker exec temporal-elasticsearch-iwf curl -fsS http://localhost:9200/_cluster/health >/dev/null 2>&1; then
              echo "Elasticsearch ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for Elasticsearch"
              docker logs temporal-elasticsearch-iwf 2>&1 | tail -80 || true
              exit 1
            fi
            sleep 5
          done
          echo "Waiting for search attributes..."
          for i in $(seq 1 120); do
            if docker logs temporal-admin-tools-iwf 2>&1 | grep -q "All search attributes are registered"; then
              echo "Search attributes ready (attempt $i)"
              break
            fi
            if [ "$i" -eq 120 ]; then
              echo "Timed out waiting for search attributes"
              docker logs temporal-admin-tools-iwf 2>&1 | tail -80 || true
              docker logs temporal-iwf 2>&1 | tail -80 || true
              exit 1
            fi
            sleep 2
          done
          echo "Waiting for iWF healthcheck..."
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8801/info/healthcheck >/dev/null 2>&1; then
              echo "iWF server healthy (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for iWF server"
          docker logs iwf-server 2>&1 | tail -80 || true
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Pytest
        run: |
          echo "[run]">>.coveragerc
          echo "omit = iwf/iwfpb/">>.coveragerc
          poetry run pytest -vv --cov-config=.coveragerc --cov="iwf/" .
      - name: Dump docker logs
        if: always()
        uses: jwalton/gh-docker-logs@v2
