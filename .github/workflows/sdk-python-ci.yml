name: Python SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk-python/**"
      - "protos/**"
      - ".github/workflows/sdk-python-ci.yml"
  pull_request:
    paths:
      - "sdk-python/**"
      - "protos/**"
      - ".github/workflows/sdk-python-ci.yml"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Run linters (sdk-python files only)
        run: |
          FILES=$(git ls-files | tr '\n' ' ')
          poetry run pre-commit run --show-diff-on-failure --color=always --files $FILES

  pytest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v4
      - name: Start iWF environment
        run: docker compose -f iwf/tests/iwf-service-env/docker-compose.yml up -d
      - name: Wait for iWF server
        run: |
          for i in $(seq 1 60); do
            if (echo >/dev/tcp/127.0.0.1/8801) >/dev/null 2>&1; then
              sleep 15
              echo "iWF server port open"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out waiting for iWF server"
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Pytest
        run: |
          echo "[run]">>.coveragerc
          echo "omit = iwf/iwf_api/">>.coveragerc
          poetry run pytest -vv --cov-config=.coveragerc --cov="iwf/" .
      - name: Dump docker logs
        if: always()
        uses: jwalton/gh-docker-logs@v2
