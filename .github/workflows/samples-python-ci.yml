name: Python samples CI

# Disabled on push/PR until the Python SDK is published under the superdurable
# package name. Re-enable path filters after release.
on:
  workflow_dispatch:

jobs:
  install:
    name: Poetry install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
