name: Python samples CI

on:
  push:
    branches: [main]
    paths:
      - "samples-python/**"
      - "sdk-python/**"
      - ".github/workflows/samples-python-ci.yml"
  pull_request:
    paths:
      - "samples-python/**"
      - "sdk-python/**"
      - ".github/workflows/samples-python-ci.yml"
  workflow_dispatch:

jobs:
  install:
    name: Poetry install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Poetry
        uses: snok/install-poetry@v1
      - name: Install dependencies
        run: poetry install --no-interaction
