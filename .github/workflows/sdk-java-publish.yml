name: Publish Java SDK to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish iwf-sdk
    runs-on: ubuntu-latest
    # Monorepo: only publish on sdk-java-v* release tags, or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'sdk-java-v')
    defaults:
      run:
        working-directory: sdk-java
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "8"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SECRET_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ""
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon
