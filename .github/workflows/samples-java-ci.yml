name: Java samples CI

on:
  push:
    branches: [main]
    paths:
      - "samples-java/**"
      - "sdk-java/script/**"
      - ".github/workflows/samples-java-ci.yml"
  pull_request:
    paths:
      - "samples-java/**"
      - "sdk-java/script/**"
      - ".github/workflows/samples-java-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build + smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples-java
    steps:
      - uses: actions/checkout@v4
      - name: Start iWF environment
        working-directory: sdk-java
        run: |
          docker compose -f script/docker-compose.yml pull iwf-server
          docker compose -f script/docker-compose.yml up -d
      - name: Wait for iWF server
        working-directory: ${{ github.workspace }}
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://127.0.0.1:8801/info/healthcheck >/dev/null 2>&1; then
              echo "iWF server healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for iWF server"
          docker logs iwf-server 2>&1 | tail -80 || true
          exit 1
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build and unit tests
        run: ./gradlew build --refresh-dependencies
      - name: Smoke signup workflow
        run: |
          ./gradlew bootRun &
          APP_PID=$!
          trap 'kill $APP_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:8803/signup/submit?username=ci-user-$GITHUB_RUN_ID&email=ci@example.com" >/dev/null 2>&1; then
              echo "signup submit ok"
              curl -fsS "http://127.0.0.1:8803/signup/verify?username=ci-user-$GITHUB_RUN_ID"
              echo
              exit 0
            fi
            sleep 2
          done
          echo "Timed out waiting for samples app"
          exit 1
      - name: Dump docker logs
        if: always()
        uses: jwalton/gh-docker-logs@v2
