name: Java samples CI

# Disabled on push/PR until the Java SDK is published under the superdurable
# Maven coordinates. Re-enable path filters after release.
on:
  workflow_dispatch:

jobs:
  build:
    name: Build samples
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "8"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build -x test
