name: Push Docker images (main)

# Requires DOCKERHUB_USERNAME / DOCKERHUB_TOKEN repo secrets.
# Manual-only until secrets are configured (auto-push was failing login).
on:
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: iworkflowio/iwf-server:latest
      - name: Build and push lite
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: iworkflowio/iwf-server-lite:latest
          file: server/lite/Dockerfile
