name: Push Docker images (main)

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/docker-image-latest.yml"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iwf-server:latest
      - name: Build and push lite
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iwf-server-lite:latest
          file: server/lite/Dockerfile
