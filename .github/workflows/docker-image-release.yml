name: Push Docker images (release)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image tag (e.g. v1.0.0)"
        required: true
        type: string

jobs:
  docker:
    runs-on: ubuntu-latest
    # Monorepo: only publish on server-v* release tags, or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.release.tag_name, 'server-v')
    steps:
      - uses: actions/checkout@v4
      - name: Resolve image tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # server-v1.2.3 -> v1.2.3
            echo "tag=${GITHUB_REF_NAME#server-}" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iwf-server:${{ steps.meta.outputs.tag }}
      - name: Build and push lite
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          platforms: linux/arm64,linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/iwf-server-lite:${{ steps.meta.outputs.tag }}
          file: server/lite/Dockerfile
