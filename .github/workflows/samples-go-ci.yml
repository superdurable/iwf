name: Go samples CI

on:
  push:
    branches: [main]
    paths:
      - "samples-go/**"
      - "sdk-go/**"
      - ".github/workflows/samples-go-ci.yml"
  pull_request:
    paths:
      - "samples-go/**"
      - "sdk-go/**"
      - ".github/workflows/samples-go-ci.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build samples
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: samples-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: samples-go/go.mod
          cache-dependency-path: samples-go/go.sum
      - name: Build against published sdk-go
        env:
          GOWORK: "off"
        run: |
          go mod download
          go build ./...
      - name: Unit tests
        env:
          GOWORK: "off"
        run: go test ./...
